#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

location ~ ^/(admin|api|cluster|mq|object-store|metrics|files|logs|storage|maintenance|login)($|/){
        include /etc/nginx/proxy_params_no_auth;
        proxy_pass http://127.0.0.1:__PORT_ADMIN__;
        proxy_redirect    off;
        client_max_body_size  __UPLOAD_MAX_SIZE__M;
    }

location /static/ {
        include /etc/nginx/proxy_params_no_auth;
        proxy_pass http://127.0.0.1:__PORT_ADMIN__;
        proxy_redirect    off;
    }

location / {
        include /etc/nginx/proxy_params_no_auth;
        proxy_pass http://127.0.0.1:__PORT_API__/;
        proxy_redirect    off;
        client_max_body_size  __UPLOAD_MAX_SIZE__M;
    }
